<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Color Audit</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 390px;
      margin: 0;
      padding: 16px;
      color: #222;
      background: #fff;
    }
    h1 { margin: 0 0 8px; font-size: 16px; }
    p, label, select, button, .hint, .status { font-size: 12px; line-height: 1.5; }
    p { margin: 0 0 12px; color: #555; }
    .row { margin-bottom: 12px; }
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #111;
      color: #fff;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .status {
      margin-top: 12px;
      white-space: pre-wrap;
      color: #333;
      min-height: 76px;
    }
    .hint { margin-top: 10px; color: #777; }
  </style>
</head>
<body>
  <h1>Color Audit</h1>
  <p>横幅 1920px を自動適用してページ全体を撮影します。番号モードと、詳しくその場所に書くモードを切り替えられます。</p>

  <div class="row">
    <label for="mode">出力モード</label>
    <select id="mode">
      <option value="numbered">番号 + 下部凡例</option>
      <option value="detailed">詳しくその場所に表示</option>
    </select>
  </div>

  <button id="captureBtn">ページ全体を保存</button>
  <div id="status" class="status"></div>
  <div class="hint">※ 同じCSSは同じ番号です。1つのCSSが5箇所以上ある場合は、離れている代表5箇所だけに表示します。</div>

  <script src="popup.js"></script>
</body>
</html>
